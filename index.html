<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>도깨비 포커 전기 · Dokkaebi Tower</title>
    <meta name="description" content="Climb the infinite tower as a Dokkaebi hunter. Battle with poker hands in this roguelike RPG." />
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0b0a12;
        overflow: hidden;
        overscroll-behavior: none;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
      }
      /* Pin the page so it can never scroll. A mobile scroll offset made the
         pointer coords (what Phaser uses) diverge from the on-screen position,
         so taps landed on the wrong (offset) element. */
      body { position: fixed; inset: 0; }
      #game-root {
        /* Plain full-viewport container. Phaser's Scale.CENTER_BOTH positions
           and centers the canvas itself — do NOT also center with flexbox, or
           the canvas double-offsets and pointer input maps to the wrong spot. */
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      #boot-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #e8d8a8;
        gap: 16px;
        z-index: 10;
        /* Never intercept game input, even if removal is delayed. */
        pointer-events: none;
        transition: opacity 0.4s ease;
      }
      #boot-overlay .title {
        font-size: clamp(22px, 5vw, 40px);
        font-weight: 800;
        letter-spacing: 2px;
        text-shadow: 0 0 18px rgba(180, 60, 220, 0.6);
      }
      #boot-overlay .sub { font-size: 14px; opacity: 0.7; }
      .spinner {
        width: 40px; height: 40px;
        border: 3px solid rgba(232, 216, 168, 0.2);
        border-top-color: #c060e0;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script type="module" crossorigin src="./assets/index-DACgGUrs.js"></script>
  </head>
  <body>
    <div id="game-root"></div>
    <div id="boot-overlay">
      <div class="title">도깨비 포커 전기</div>
      <div class="spinner"></div>
      <div class="sub">Dokkaebi Tower — loading…</div>
    </div>
  </body>
</html>
